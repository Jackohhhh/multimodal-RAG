# ============================================================
# 多模态客服智能体 - 主配置文件
# ============================================================

# --- 大语言模型 ---
# 使用 Google Gemini：provider 设为 google_genai，model 如 gemini-2.0-flash / gemini-2.5-flash；
# 在 set_env.sh 或环境中 export GOOGLE_API_KEY="..."（或 GEMINI_API_KEY）。勿设置 OPENAI_API_BASE。
llm:
  # model: "kimi-k2-0905-preview"
  model: "deepseek-chat"
  provider: "openai"
  temperature: 0.8
  timeout: 60
  max_tokens: 2000

# 多模态模型（用于图片理解、caption 生成）
multimodal_llm:
  model: "moonshot-v1-8k"
  provider: "openai"
  temperature: 0.8
  timeout: 60
  max_tokens: 1000

# --- Embedding 模型 ---
embeddings:
  model_name: "BAAI/bge-m3"  # 多语言模型，同时支持中英文

# --- 数据路径 ---
data:
  manuals_path: "./data/manuals"        # 存放 [text, [image_ids]] 格式的 JSON 文件
  images_path: "./data/images"          # 配图文件（按图片ID命名）
  chunks_output: "./data_processed/chunks/chunks.jsonl"

# --- 向量数据库 ---
vector_store:
  type: "faiss"
  index_path: "./index/text_index/faiss"

# --- 文本切分 ---
chunking:
  chunk_size: 800
  chunk_overlap: 150
  # 块内一旦出现「超过 dot_run_max_allowed 个」连续英文 `.`，整段丢弃（目录引导线等）
  strip_dot_leader_lines: true
  dot_run_max_allowed: 10

# --- 检索参数 ---
retrieval:
  # 粗排候选：与 vector_top_k 取 max 后作为向量召回条数，供精排从更大池子里选真相关段
  search_k: 15
  rerank_top_n: 2
  use_rerank: false
  flashrank_model: "ms-marco-MiniLM-L-12-v2"
  flashrank_cache_dir: "./models/flashrank"
  rag_relevance_threshold: 0.4
  use_hybrid_bm25: true
  vector_top_k: 6
  bm25_top_k: 5
  rag_max_context_documents: 6
  # 英文为主的问题：不调用客服兜底模型；无检索/幻觉等仍用 RAG 主提示词 + 主 LLM
  english_rag_only_no_customer_service_llm: true
