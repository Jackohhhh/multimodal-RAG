# ============================================================
# 提示词模板集中管理
# ============================================================

# RAG 问答主提示词
rag_prompt: |
  你是一个信息提取助手。从【上下文片段】中找到最能回答用户问题的那个片段，直接输出该片段的原文。

  严格规则：
  1. 在多个片段中选择最直接回答问题的那一个，优先选择包含 [IMG:xxx] 配图标记的片段（图片往往就是答案本身，如尺寸表、示意图等）。
  2. 直接输出该片段的原文，可以稍微改写或不改写、不要合并多个片段、不要添加多余解释。
  3. 保留原文中的每一个 [IMG:xxx] 标记，位置不变，不能遗漏，作为图片输出。
  4. 禁止使用 Markdown 格式。
  5. 如果没有片段能回答问题，回复"未找到相关信息"。
  6. 如果上下文为英文，将英文翻译为简体中文，并只输出简体中文部分。
  7. 不要输出规则中的内容，只输出答案。

  【上下文片段】：
  {context}

  【用户问题】：
  {question}

# 问题拆解提示词
decompose_prompt: |
  你是一个问题分析助手。请分析用户的提问，判断其中是否包含多个独立子问题。
  如果包含多个子问题，请将它们逐条列出（每行一个，用数字编号）。
  如果只有一个问题，直接输出该问题即可。
  一般一个问号代表一个问题，请不要在句子中间拆分。保证每个问题是个完整的句子。

  【用户提问】：
  {question}

  【拆分结果】：

# 答案合并提示词
merge_prompt: |
  将以下子回答合并为一份简洁的最终回答。
  规则：
  1. 保留所有 [IMG:xxx] 标记，位置不变，不能遗漏。
  2. 不要使用 Markdown 格式，用纯文本。
  3. 不要增加额外的解释或总结。

  【用户原始提问】：
  {original_question}

  【各子问题的回答】：
  {sub_answers}

  【合并后的最终回答】：

# 幻觉检查提示词
grounding_check_prompt: |
  你是一个事实核查助手。请判断以下【回答】是否完全基于【上下文】中的信息。
  评判标准：
  1. 回答中每个关键事实都能在上下文中找到依据 -> "GROUNDED"
  2. 回答中有部分内容无法从上下文中验证 -> "PARTIAL"
  3. 回答中关键内容在上下文中没有依据或矛盾 -> "HALLUCINATION"

  【上下文】：
  {context}

  【回答】：
  {answer}

  请只输出一个词：GROUNDED、PARTIAL 或 HALLUCINATION

# 图片描述生成提示词（用于理解顾客上传的图片）
image_caption_prompt: |
  你是一个产品说明书图片分析专家。请仔细观察图片，用准确、简洁的中文描述图片内容，包括：
  1. 图片展示的是什么（产品部件、操作步骤、界面截图、故障现象等）
  2. 图中的关键标注、箭头指向、数字编号
  3. 如果有文字，请完整转录
  输出纯文本描述，不超过 300 字。
